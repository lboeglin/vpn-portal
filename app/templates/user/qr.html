{% extends "layout.html" %}

{% block title %}QR Code — {{ peer.name }} — VPN Portal{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">QR Code — {{ peer.name }}</h1>
  <a href="{{ url_for('user.dashboard') }}" class="btn btn-outline-secondary btn-sm">
    &larr; Back
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card text-center">
      <div class="card-body py-4">
        <img src="data:image/png;base64,{{ qr_b64 }}"
             alt="WireGuard QR code for {{ peer.name }}"
             class="img-fluid"
             style="max-width: 320px;">
        <p class="text-muted small mt-3 mb-0">
          Scan with the WireGuard app to import this config.
        </p>
      </div>
      <div class="card-footer">
        <a href="{{ url_for('user.download') }}" class="btn btn-primary btn-sm">
          Download .conf instead
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
