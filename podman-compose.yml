version: "3.8"

services:
  vpn-portal:
    # In production, set CONTAINER_IMAGE=ghcr.io/<owner>/<repo>:latest
    # and run with: CONTAINER_IMAGE=... podman-compose up -d --no-build
    image: ${CONTAINER_IMAGE:-vpn-portal:latest}
    build:
      context: .
      dockerfile: Containerfile
    container_name: vpn-portal
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL to persist the DB in the named volume below
      DATABASE_URL: sqlite:////data/vpn_portal.db
    network_mode: host
    volumes:
      # Persistent SQLite database
      - vpn-portal-data:/data
      # WireGuard config directory (read-only — host service writes wg0.conf)
      - /etc/wireguard:/etc/wireguard:ro
      # Shared dir for peers file written by the app, read by host sync service
      - /var/lib/vpn-portal:/var/lib/vpn-portal:z
    cap_add:
      - NET_ADMIN

volumes:
  vpn-portal-data:
    external: true
